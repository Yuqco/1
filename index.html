<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MilkyVideo - B站风格练习站</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="top-nav">
      <div class="logo">MilkyVideo</div>
      <nav class="main-nav">
        <a href="#">首页</a>
        <a href="#live">直播</a>
        <a href="#anime">番剧</a>
        <a href="#gaming">游戏</a>
        <a href="#knowledge">知识</a>
      </nav>
      <div class="search-wrap">
        <input id="searchInput" placeholder="搜索视频/UP主" />
        <button id="searchBtn">搜索</button>
      </div>
      <div class="user-actions">
        <button id="themeBtn">🌓</button>
        <button id="loginBtn">登录</button>
        <button class="post-btn">投稿</button>
      </div>
    </header>

    <main class="layout">
      <aside class="left-sidebar">
        <h3>分区</h3>
        <ul id="categoryList"></ul>
        <h3>创作中心</h3>
        <ul>
          <li><a href="#">稿件管理</a></li>
          <li><a href="#">数据中心</a></li>
          <li><a href="#">评论管理</a></li>
        </ul>
      </aside>

      <section class="content-area">
        <div class="hero-banner">
          <div>
            <h1>高能内容，每天更新</h1>
            <p>一个用于练习前端工程能力的 B 站风格站点（无官方素材、无商标复刻）</p>
          </div>
          <button id="playRandomBtn">随机播放</button>
        </div>

        <section class="quick-tabs">
          <button class="tab active" data-tab="recommend">推荐</button>
          <button class="tab" data-tab="following">关注</button>
          <button class="tab" data-tab="hot">热门</button>
          <button class="tab" data-tab="rank">排行榜</button>
        </section>

        <section id="videoGrid" class="video-grid"></section>
      </section>

      <aside class="right-sidebar">
        <section class="panel">
          <h3>热搜榜</h3>
          <ol id="hotList"></ol>
        </section>

        <section class="panel">
          <h3>直播推荐</h3>
          <div id="liveList"></div>
        </section>

        <section class="panel">
          <h3>今日任务</h3>
          <ul id="taskList">
            <li><input type="checkbox" /> 每日签到</li>
            <li><input type="checkbox" /> 观看 10 分钟</li>
            <li><input type="checkbox" /> 发一条评论</li>
          </ul>
        </section>
      </aside>
    </main>

    <section id="playerModal" class="player-modal hidden">
      <div class="player-container">
        <button id="closePlayer" class="close">✕</button>
        <video id="videoPlayer" controls poster="https://images.unsplash.com/photo-1485846234645-a62644f84728?auto=format&fit=crop&w=1200&q=80">
          <source src="https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4" type="video/mp4" />
        </video>
        <div class="danmaku-layer" id="danmakuLayer"></div>
        <div class="player-meta">
          <h2 id="playerTitle">视频标题</h2>
          <div class="stats">
            <span id="playCount">0 播放</span>
            <span id="likeCount">0 点赞</span>
            <span id="coinCount">0 投币</span>
          </div>
          <div class="actions">
            <button id="likeBtn">👍 点赞</button>
            <button id="coinBtn">🪙 投币</button>
            <button id="favBtn">⭐ 收藏</button>
            <input id="danmakuInput" placeholder="发个弹幕吧~" />
            <button id="sendDanmaku">发送</button>
          </div>
        </div>
      </div>
    </section>

    <footer>
      <p>MilkyVideo © 2026 | 仅用于学习与演示</p>
    </footer>

    <script src="app.js"></script>
  </body>
</html>
